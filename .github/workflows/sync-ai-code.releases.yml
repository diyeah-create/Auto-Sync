name: 同步外部发布资产

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 获取当前运行时间
        id: datetime
        run: echo "utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: 同步最新发布（仅元数据）
        run: |
          echo "开始同步..."
          python scripts/ai-code-tool.py
          echo "同步完成"
          echo "检查 artifacts 目录:"
          ls -la artifacts/ || echo "artifacts 目录不存在"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_DATETIME: ${{ steps.datetime.outputs.utc }}
          METADATA_ONLY: 'true'

      - name: 检查是否有更新
        id: changes
        run: |
          git status
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "检测到更改:"
            git status --porcelain
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "没有检测到更改"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送更新
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: 更新外部发布版本信息"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
