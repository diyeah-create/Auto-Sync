name: 'Merge Clash Config'

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

env:
  TZ: Asia/Shanghai  # 全局时区设置为北京时间

jobs:
  merge:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display current Beijing time
        run: |
          echo "当前北京时间：$(date '+%Y-%m-%d %H:%M:%S')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests PyYAML

      - name: Setup subconverter
        run: |
          # 下载 subconverter
          wget https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -xzf subconverter_linux64.tar.gz
          
          # 启动 subconverter 服务（后台运行）
          cd subconverter
          chmod +x subconverter
          ./subconverter &
          
          # 等待服务启动
          sleep 5
          
          # 测试服务是否正常
          curl -f http://127.0.0.1:25500/version || exit 1
          
          echo "✓ subconverter 服务已启动"

      - name: Sync ACL4SSR template
        run: |
          # 创建模板目录
          mkdir -p templates
          
          # 下载 ACL4SSR 模板
          echo "正在下载 ACL4SSR 模板..."
          curl -fsSL https://raw.githubusercontent.com/beck-8/override-hub/refs/heads/main/yaml/ACL4SSR_Online_Full.yaml -o templates/ACL4SSR_Online_Full.yaml
          
          if [ -f templates/ACL4SSR_Online_Full.yaml ]; then
            echo "✓ ACL4SSR 模板同步完成"
            ls -lh templates/ACL4SSR_Online_Full.yaml
          else
            echo "✗ ACL4SSR 模板下载失败"
            exit 1
          fi

      - name: Merge Clash configurations
        run: |
          python scripts/merge_clash_config.py

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # 强制添加 clash/GG 和 templates 目录，避免被 .gitignore 忽略
          git add -f clash/GG/ templates/

          # 提交更改
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # 使用时间戳确保每次提交信息唯一
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
            git commit -m "chore: update clash config - $TIMESTAMP"
            
            # 先拉取远程更改
            git fetch origin main
            
            # 如果有冲突，使用本地版本
            git merge origin/main --no-edit --strategy-option=ours || true
            
            # 推送
            git push origin main
          fi
