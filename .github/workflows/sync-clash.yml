name: 'Sync Clash Repository'

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

env:
  TZ: Asia/Shanghai  # 全局时区设置为北京时间

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display current Beijing time
        run: |
          echo "当前北京时间：$(date '+%Y-%m-%d %H:%M:%S')"

      - name: Sync Clash repository
        run: |
          # 创建临时目录
          TEMP_DIR=$(mktemp -d)

          # 克隆 Clash 仓库到临时目录
          git clone https://github.com/liandu2024/clash.git "$TEMP_DIR"

          # 确保目标目录存在
          mkdir -p clash

          # 复制文件，排除 .git 目录
          rsync -av --delete --exclude='.git' "$TEMP_DIR/" clash/

          # 清理临时目录
          rm -rf "$TEMP_DIR"

          # 替换文件中的引用路径
          find clash -type f -exec sed -i 's|liandu2024/clash/refs/heads/main|walke2019/Auto-Sync/refs/heads/main/clash|g' {} +

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # 强制添加 clash 目录，避免被 .gitignore 忽略
          git add -f clash/

          # 提交更改
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync clash repository and update references"
            git push
          fi
